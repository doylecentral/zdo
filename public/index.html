<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Zero Dash One — creative technology studio">
  <meta property="og:title" content="Zero Dash One">

  <meta name="twitter:card" content="summary">

  <meta name="version" content="1.0.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
      cursor: default;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      opacity: 0;
      transition: opacity 1.5s ease-in;
    }
    canvas.loaded {
      opacity: 1;
    }
    footer.contact {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 12px;
      text-align: center;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 10px;
      letter-spacing: 0.05em;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.32);
      pointer-events: none;
      z-index: 10;
      -webkit-user-select: text;
      user-select: text;
      padding: 0 12px;
    }
    footer.contact a, footer.contact .addr {
      pointer-events: auto;
    }
    footer.contact a {
      color: inherit;
      text-decoration: none;
      transition: color 0.25s ease;
    }
    footer.contact a:hover {
      color: rgba(255, 255, 255, 0.75);
      text-decoration: underline;
    }
    footer.contact .sep {
      opacity: 0.5;
      margin: 0 6px;
    }
    @media (max-width: 600px) {
      footer.contact { font-size: 9px; bottom: 8px; line-height: 1.6; }
    }
  </style>
</head>
<body>
  <noscript>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#fff;font-family:Helvetica,sans-serif;text-align:center;">
      <div>
        <svg viewBox="0 0 64 64" width="64" height="64" style="margin-bottom:1rem;">
          <polygon points="32,8 56,56 8,56" fill="none" stroke="#fff" stroke-width="2"/>
        </svg>
        <h1 style="font-weight:300;letter-spacing:0.1em;">Zero Dash One</h1>
        <p style="opacity:0.5;margin-top:0.5rem;">Enable JavaScript to experience this site.</p>
      </div>
    </div>
  </noscript>
  <footer class="contact" role="contentinfo">
    <div>Zero Dash One LLC &mdash; creative technology studio</div>
    <div>
      <a href="mailto:hello@zerodashone.com">hello@zerodashone.com</a>
      <span class="sep">&middot;</span>
      <a href="tel:+18302835500">830.283.5500</a>
      <span class="sep">&middot;</span>
      <span class="addr">[STREET], [CITY], TX [ZIP]</span>
    </div>
    <div>
      <a href="/privacy">Privacy</a>
      <span class="sep">&middot;</span>
      <a href="/terms">Terms</a>
    </div>
  </footer>
